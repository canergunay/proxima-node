[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
timeout = 30

# Note: privilege escalation not needed since ansible_user=root in hosts.yml.
# All tasks run as root directly via SSH — no sudo required.

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
