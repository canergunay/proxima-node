---
- name: Generate self-signed TLS certificate for ssconf
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -nodes -newkey ec -pkeyopt ec_paramgen_curve:prime256v1
      -keyout {{ outline_ss_dir }}/key.pem -out {{ outline_ss_dir }}/cert.pem
      -days 3650 -subj "/CN=proxima-node"
      -addext "subjectAltName=IP:{{ server_ip | default(ansible_default_ipv4.address) }}"
    creates: "{{ outline_ss_dir }}/cert.pem"

- name: Set cert permissions
  ansible.builtin.file:
    path: "{{ outline_ss_dir }}/{{ item.name }}"
    mode: "{{ item.mode }}"
  loop:
    - { name: cert.pem, mode: "0644" }
    - { name: key.pem, mode: "0600" }

- name: Deploy ssconf server script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../templates/ssconf-server.py"
    dest: "{{ outline_ss_dir }}/ssconf-server.py"
    owner: root
    group: root
    mode: "0644"
  notify: restart ssconf

- name: Deploy ssconf systemd service
  ansible.builtin.template:
    src: proxima-ssconf.service.j2
    dest: /etc/systemd/system/proxima-ssconf.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon reload
    - restart ssconf

- name: Enable and start ssconf
  ansible.builtin.systemd:
    name: proxima-ssconf
    enabled: true
    state: started
    daemon_reload: true

- name: Allow ssconf port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssconf_port }}"
    proto: tcp
    comment: "ssconf HTTPS"
