# Shared defaults for all servers
ss_cipher: chacha20-ietf-poly1305
ss_port: 8388
ss_prefix: "FgMBAgABAAH8AwM="
agent_port: 5051
ssconf_port: 8390

# outline-ss-server version (VPN exit nodes)
outline_ss_version: "1.5.0"

# SSH key for ongoing management (injected during provisioning)
# Replace with your actual public key
ssh_public_key: "ssh-ed25519 CHANGE_ME proxima-adm"

# Proxima instance IPs (for UFW agent port restriction)
proxima_ips:
  - 46.138.254.119    # ERG public
  - 46.39.245.211     # OFC public
  - 192.168.2.91      # ERG LAN (for ERG-RU)

# Docker install (needed for AWG/Xray/AdGuard)
install_docker: true
