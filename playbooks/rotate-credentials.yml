---
# Rotate credentials on servers
# Generates new SS password, ssconf token, agent API key.
# Updates configs and restarts affected services.
#
# Usage:
#   ansible-playbook playbooks/rotate-credentials.yml -l erg-pl
#   ansible-playbook playbooks/rotate-credentials.yml -l vpn_exit
#
# IMPORTANT: After running, update Proxima's tunnel_config with new credentials.
# The playbook will output the new credentials at the end.

- name: Rotate Credentials
  hosts: all
  gather_facts: false

  vars_prompt:
    - name: confirm_rotate
      prompt: "This will rotate ALL credentials. Type 'yes' to continue"
      private: false

  pre_tasks:
    - name: Abort if not confirmed
      ansible.builtin.assert:
        that:
          - confirm_rotate == 'yes'
        fail_msg: "Rotation cancelled"

  tasks:
    # Generate new credentials (universal)
    - name: Generate new SS password
      ansible.builtin.set_fact:
        new_ss_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

    - name: Generate new agent API key
      ansible.builtin.set_fact:
        new_agent_api_key: "{{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"

    # Generate VPN exit-specific credentials
    - name: Generate new ssconf token (VPN exit only)
      ansible.builtin.set_fact:
        new_ssconf_token: "{{ lookup('password', '/dev/null length=48 chars=ascii_letters,digits') }}"
      when: "'vpn_exit' in group_names"

    # Update SS config — VPN Exit (outline-ss-server)
    - name: Update outline-ss-server config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/outline-ss/templates/config.yml.j2"
        dest: /opt/outline-ss/config.yml
        owner: root
        group: root
        mode: "0640"
      vars:
        ss_password: "{{ new_ss_password }}"
      when: "'vpn_exit' in group_names"
      notify: restart outline-ss

    # Update SS config — DPI Bypass (shadowsocks-libev)
    - name: Update shadowsocks-libev config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/ss-server/templates/config.json.j2"
        dest: /etc/shadowsocks-libev/config.json
        owner: root
        group: root
        mode: "0640"
      vars:
        ss_password: "{{ new_ss_password }}"
      when: "'dpi_bypass' in group_names"
      notify: restart ss-server

    # Update ssconf service env (VPN exit only)
    - name: Update ssconf service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/ssconf/templates/proxima-ssconf.service.j2"
        dest: /etc/systemd/system/proxima-ssconf.service
        owner: root
        group: root
        mode: "0644"
      vars:
        ss_password: "{{ new_ss_password }}"
        ssconf_token: "{{ new_ssconf_token }}"
      when: "'vpn_exit' in group_names"
      notify: restart ssconf

    # Update agent config (universal)
    - name: Update agent config with new API key
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/proxima-agent/templates/config.json.j2"
        dest: "{{ agent_dir | default('/opt/proxima-agent') }}/config.json"
        owner: root
        group: root
        mode: "0600"
      vars:
        agent_api_key: "{{ new_agent_api_key }}"
      notify: restart proxima-agent

    # Output new credentials
    - name: Display new credentials (VPN exit)
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════
          NEW CREDENTIALS for {{ inventory_hostname }}
          ═══════════════════════════════════════════
          SS Password:     {{ new_ss_password }}
          Agent API Key:   {{ new_agent_api_key }}
          ssconf Token:    {{ new_ssconf_token }}
          ssconf URL:      https://{{ server_ip }}:{{ ssconf_port | default(8390) }}/{{ new_ssconf_token }}
          ═══════════════════════════════════════════
          UPDATE Proxima tunnel_config with these values!
          ═══════════════════════════════════════════
      when: "'vpn_exit' in group_names"

    - name: Display new credentials (DPI bypass)
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════
          NEW CREDENTIALS for {{ inventory_hostname }}
          ═══════════════════════════════════════════
          SS Password:     {{ new_ss_password }}
          Agent API Key:   {{ new_agent_api_key }}
          ═══════════════════════════════════════════
          UPDATE Proxima tunnel_config with these values!
          ═══════════════════════════════════════════
      when: "'dpi_bypass' in group_names"

  handlers:
    - name: restart outline-ss
      ansible.builtin.systemd:
        name: outline-ss-server
        state: restarted

    - name: restart ss-server
      ansible.builtin.systemd:
        name: "shadowsocks-libev-server@config"
        state: restarted

    - name: restart ssconf
      ansible.builtin.systemd:
        name: proxima-ssconf
        state: restarted
        daemon_reload: true

    - name: restart proxima-agent
      ansible.builtin.systemd:
        name: proxima-agent
        state: restarted
