---
# Install Xray VLESS Reality on VPN exit nodes
#
# Usage:
#   ansible-playbook playbooks/install-xray-reality.yml -l erg-tr
#   ansible-playbook playbooks/install-xray-reality.yml           # all vpn_exit

- name: Install Xray VLESS Reality
  hosts: vpn_exit
  gather_facts: true

  roles:
    - role: xray-reality
      tags: [xray-reality]

  post_tasks:
    - name: Verify xray-reality health
      ansible.builtin.command:
        cmd: "systemctl is-active xray-reality"
      register: xray_status
      changed_when: false

    - name: Read VLESS keys
      ansible.builtin.slurp:
        src: /opt/xray-reality/keys.json
      register: final_keys

    - name: Display VLESS info
      ansible.builtin.debug:
        msg: |
          VLESS Reality deployed on {{ inventory_hostname }}
          ─────────────────────────────────────────
          Status:     {{ xray_status.stdout }}
          Port:       {{ vless_port }}
          UUID:       {{ (final_keys.content | b64decode | from_json).uuid }}
          Public Key: {{ (final_keys.content | b64decode | from_json).public_key }}
          Short ID:   {{ (final_keys.content | b64decode | from_json).short_id }}
          SNI:        {{ vless_reality_sni }}
          ─────────────────────────────────────────
      tags: [always]
